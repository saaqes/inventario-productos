<h2>Lista de productos</h2>

@if (products.length === 0) {
  <div>No hay productos registrados</div>
} @else {
  <ul>
    @for (product of products; track product.id) {
      <li>
        {{ product.name }} - ${{ product.price }}
        <button (click)="deleteProduct(product.id)">Eliminar</button>
      </li>
    }
  </ul>
}
